<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영단어 퀴즈</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
  --text: #1a1a1a; --text-secondary: #666660; --text-tertiary: #999994;
  --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.2);
  --radius-md: 8px; --radius-lg: 12px;
  --success-bg: #eaf3de; --success-text: #3b6d11; --success-border: #639922;
  --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: #e24b4a;
  --info-bg: #e6f1fb; --info-text: #185fa5;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
    --text: #f0efeb; --text-secondary: #a8a8a2; --text-tertiary: #666660;
    --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.18);
    --success-bg: #173404; --success-text: #c0dd97; --success-border: #3b6d11;
    --danger-bg: #501313; --danger-text: #f09595; --danger-border: #a32d2d;
    --info-bg: #042c53; --info-text: #85b7eb;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-tertiary); color: var(--text);
  min-height: 100vh; display: flex;
  align-items: flex-start; justify-content: center; padding: 2rem 1rem;
}
.container {
  width: 100%; max-width: 600px; background: var(--bg);
  border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2rem;
}
.app-title { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
.app-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.5rem; }
.screen { display: none; }
.screen.active { display: block; }
.section-label {
  font-size: 12px; font-weight: 500; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px;
}
.card {
  background: var(--bg-secondary); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
}
.btn-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
.btn-primary {
  background: var(--text); color: var(--bg); border: none;
  border-radius: var(--radius-md); padding: 10px 20px;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
}
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-secondary {
  background: transparent; color: var(--text);
  border: 0.5px solid var(--border-md); border-radius: var(--radius-md);
  padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: inherit;
}
.btn-secondary:hover { background: var(--bg-secondary); }
.info-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem;
}
.info-field label {
  font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 6px;
}
.info-input {
  width: 100%; font-size: 16px; padding: 10px 14px;
  border: 0.5px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg); color: var(--text); font-family: inherit;
}
.info-input:focus { outline: none; border-color: var(--border-md); }
.error-msg { font-size: 13px; color: var(--danger-text); margin-top: 6px; display: none; }
.word-list {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.word-item {
  font-size: 13px; padding: 6px 10px;
  background: var(--bg); border: 0.5px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-secondary);
}
.word-en { font-weight: 500; color: var(--text); }
.progress-bar-wrap {
  background: var(--bg-secondary); border-radius: 99px;
  height: 6px; margin-bottom: 1.5rem; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: var(--text);
  border-radius: 99px; transition: width .3s ease;
}
.q-counter { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
.q-text { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; line-height: 1.4; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
.option-btn {
  background: var(--bg); border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 14px 16px;
  font-size: 14px; color: var(--text); cursor: pointer;
  text-align: left; font-family: inherit; line-height: 1.4; transition: border-color .15s;
}
.option-btn:hover:not(:disabled) { border-color: var(--border-md); background: var(--bg-secondary); }
.option-btn.correct { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); }
.option-btn.wrong { border-color: var(--danger-border); background: var(--danger-bg); color: var(--danger-text); }
.feedback-msg { font-size: 14px; font-weight: 500; margin-bottom: 1rem; min-height: 20px; }
.feedback-msg.correct { color: var(--success-text); }
.feedback-msg.wrong { color: var(--danger-text); }
.answer-reveal { font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem; }
.student-tag {
  font-size: 13px; background: var(--bg-secondary);
  border-radius: var(--radius-md); padding: 4px 10px;
  display: inline-block; margin-bottom: 1rem; color: var(--text-secondary);
}
.result-score { font-size: 48px; font-weight: 500; line-height: 1; margin-bottom: 4px; }
.sync-status {
  font-size: 12px; padding: 4px 10px; border-radius: 99px;
  display: inline-block; margin-top: 1rem;
}
.sync-ok { background: var(--success-bg); color: var(--success-text); }
.sync-fail { background: var(--danger-bg); color: var(--danger-text); }
.sync-ing { background: var(--info-bg); color: var(--info-text); }
.review-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px;
}
.review-item:last-child { border-bottom: none; }
@media (max-width: 480px) {
  .container { padding: 1.25rem; }
  .options-grid { grid-template-columns: 1fr; }
  .info-row { grid-template-columns: 1fr; }
  .word-list { grid-template-columns: 1fr; }
  .q-text { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="app-title">📝 영단어 퀴즈</div>
  <div class="app-subtitle">영어 → 한국어 · 4지선다 · 20문항</div>

  <!-- 설정 화면 -->
  <div id="screen-setup" class="screen active">
    <div class="card">
      <p class="section-label">학생 정보</p>
      <div class="info-row">
        <div class="info-field">
          <label>학년</label>
          <input type="number" class="info-input" id="input-grade" placeholder="예: 2" min="1" max="3" />
        </div>
        <div class="info-field">
          <label>반</label>
          <input type="number" class="info-input" id="input-class" placeholder="예: 3" min="1" max="20" />
        </div>
        <div class="info-field">
          <label>번호</label>
          <input type="number" class="info-input" id="input-number" placeholder="예: 15" min="1" max="50" />
        </div>
        <div class="info-field">
          <label>이름</label>
          <input type="text" class="info-input" id="input-name" placeholder="예: 홍길동" autocomplete="off" />
        </div>
      </div>
      <p class="error-msg" id="info-error">학년, 반, 번호, 이름을 모두 입력해주세요.</p>
    </div>

    <div class="card">
      <p class="section-label">오늘의 단어 목록 (20개)</p>
      <div class="word-list" id="word-list-display"></div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="startQuiz()">▶ 퀴즈 시작</button>
    </div>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="screen-quiz" class="screen">
    <div class="student-tag" id="quiz-student-tag"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="q-counter" id="q-counter"></p>
    <p class="q-text" id="q-text"></p>
    <div class="options-grid" id="options-grid"></div>
    <p class="feedback-msg" id="feedback-msg"></p>
    <p class="answer-reveal" id="answer-reveal"></p>
    <div class="btn-row" id="next-btn-row" style="display:none;">
      <button class="btn-primary" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result" class="screen">
    <div class="card" style="text-align:center;padding:2rem;">
      <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px;" id="result-student"></p>
      <p class="result-score" id="result-pct"></p>
      <p style="font-size:15px;color:var(--text-secondary);margin-top:4px;" id="result-fraction"></p>
      <p style="font-size:14px;color:var(--text-secondary);margin-top:12px;" id="result-msg"></p>
      <div id="save-status"></div>
    </div>
    <div id="wrong-review-wrap" style="display:none;">
      <p class="section-label" style="margin-bottom:8px;">틀린 단어 복습</p>
      <div class="card" id="review-list"></div>
    </div>
    <div class="btn-row" style="margin-top:1rem;">
      <button class="btn-primary" onclick="retryQuiz()">↺ 다시 풀기</button>
      <button class="btn-secondary" onclick="goHome()">처음으로</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbze9TYpSVnZXrU3mM9oO449ULxvc-nzmCMm2UhrpnJr6OHQzs6_KPXusleI9ndVsE2B/exec';
const QUIZ_COUNT = 20;

const WORDS = [
  { en: 'abstract', ko: '추상적인' },
  { en: 'proponent', ko: '옹호자' },
  { en: 'obedient', ko: '순종적인' },
  { en: 'tyranny', ko: '독재, 폭정' },
  { en: 'nurture', ko: '양육하다' },
  { en: 'dilute', ko: '희석하다' },
  { en: 'characterize', ko: '특징이 되다' },
  { en: 'wary', ko: '경계하는' },
  { en: 'eruption', ko: '폭발' },
  { en: 'immerse', ko: '담그다, 몰두시키다' },
  { en: 'expertise', ko: '전문 지식' },
  { en: 'debris', ko: '잔해' },
  { en: 'tenant', ko: '세입자, 임차인' },
  { en: 'discourse', ko: '담론, 연설' },
  { en: 'reinforce', ko: '강화하다' },
  { en: 'numerous', ko: '다수의' },
  { en: 'respective', ko: '각각의' },
  { en: 'latitude', ko: '위도' },
  { en: 'essential', ko: '본질적인' },
  { en: 'decline', ko: '감소하다, 거절하다' }
];

let questions = [], currentQ = 0, score = 0, wrongList = [], answered = false;
let studentGrade = '', studentClass = '', studentNum = '', studentName = '';

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function initWordList() {
  const container = document.getElementById('word-list-display');
  container.innerHTML = WORDS.map(w =>
    '<div class="word-item"><span class="word-en">' + w.en + '</span> · ' + w.ko + '</div>'
  ).join('');
}

function startQuiz() {
  const infoErr = document.getElementById('info-error');
  infoErr.style.display = 'none';
  studentGrade = document.getElementById('input-grade').value.trim();
  studentClass = document.getElementById('input-class').value.trim();
  studentNum = document.getElementById('input-number').value.trim();
  studentName = document.getElementById('input-name').value.trim();
  if (!studentGrade || !studentClass || !studentNum || !studentName) {
    infoErr.style.display = 'block'; return;
  }
  buildQuestions();
  currentQ = 0; score = 0; wrongList = [];
  showScreen('screen-quiz');
  document.getElementById('quiz-student-tag').textContent =
    studentGrade + '학년 ' + studentClass + '반 ' + studentNum + '번 ' + studentName;
  renderQuestion();
}

function buildQuestions() {
  const seed = getDailySeed();
  const shuffled = seededShuffle(WORDS, seed).slice(0, QUIZ_COUNT);
  questions = shuffled.map(w => ({ word: w }));
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = (currentQ + 1) + ' / ' + total;
  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('answer-reveal').textContent = '';
  document.getElementById('next-btn-row').style.display = 'none';
  document.getElementById('q-text').textContent = q.word.en;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const pool = WORDS.filter(w => w.en !== q.word.en);
  const distractors = shuffle(pool).slice(0, 3).map(w => w.ko);
  const options = shuffle([q.word.ko, ...distractors]);
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => checkMC(btn, opt, q.word.ko, q);
    grid.appendChild(btn);
  });
}

function checkMC(btn, chosen, answer, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback-msg');
  if (chosen === answer) {
    btn.classList.add('correct'); score++;
    fb.textContent = '정답이에요!'; fb.className = 'feedback-msg correct';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === answer) b.classList.add('correct');
    });
    fb.textContent = '틀렸어요.'; fb.className = 'feedback-msg wrong';
    wrongList.push({ word: q.word, your: chosen });
  }
  document.getElementById('next-btn-row').style.display = 'flex';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else renderQuestion();
}

async function saveToSheet() {
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const statusEl = document.getElementById('save-status');
  statusEl.innerHTML = '<span class="sync-status sync-ing">⏳ 저장 중...</span>';
  try {
    const params = new URLSearchParams({
      action: 'save',
      grade: studentGrade,
      classNum: studentClass,
      number: studentNum,
      studentName: studentName,
      score: pct,
      correct: score,
      total: total
    });
    const res = await fetch(SCRIPT_URL + '?' + params.toString());
    const json = await res.json();
    if (json.result === 'success') {
      statusEl.innerHTML = '<span class="sync-status sync-ok">✓ 구글 시트에 저장됐어요!</span>';
    } else {
      statusEl.innerHTML = '<span class="sync-status sync-fail">✗ 저장 실패: ' + (json.message || '알 수 없는 오류') + '</span>';
    }
  } catch (err) {
    statusEl.innerHTML = '<span class="sync-status sync-fail">✗ 저장 실패. 인터넷 연결을 확인해주세요.</span>';
  }
}

function showResult() {
  showScreen('screen-result');
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('result-student').textContent =
    studentGrade + '학년 ' + studentClass + '반 ' + studentNum + '번 ' + studentName;
  document.getElementById('result-pct').textContent = pct + '%';
  document.getElementById('result-fraction').textContent = score + ' / ' + total + ' 정답';
  let msg = '';
  if (pct === 100) msg = '완벽해요! 모든 단어를 알고 있어요.';
  else if (pct >= 80) msg = '잘 했어요! 조금만 더 복습하면 완벽해요.';
  else if (pct >= 60) msg = '절반 이상 맞혔어요. 틀린 단어를 복습해봐요.';
  else msg = '틀린 단어를 중심으로 다시 공부해봐요.';
  document.getElementById('result-msg').textContent = msg;
  saveToSheet();
  const reviewWrap = document.getElementById('wrong-review-wrap');
  const listEl = document.getElementById('review-list');
  if (wrongList.length > 0) {
    reviewWrap.style.display = 'block';
    listEl.innerHTML = wrongList.map(w =>
      '<div class="review-item">' +
      '<span style="color:var(--danger-text);flex-shrink:0;margin-top:1px;">✗</span>' +
      '<div>' +
      '<div style="font-weight:500;">' + w.word.en + ' — ' + w.word.ko + '</div>' +
      '<div style="font-size:13px;color:var(--danger-text);margin-top:2px;">내 답: ' + w.your + '</div>' +
      '</div></div>'
    ).join('');
  } else {
    reviewWrap.style.display = 'none';
  }
}

function retryQuiz() {
  currentQ = 0; score = 0; wrongList = [];
  buildQuestions();
  showScreen('screen-quiz');
  renderQuestion();
}

function goHome() { showScreen('screen-setup'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

initWordList();
</script>
</body>
</html>
